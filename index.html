<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skin & Mind</title>

<style>
:root {
  --bg: #e6a1b3; /* your pink */
  --surface: #ffffff;
  --text: #000000;
  --border: rgba(0,0,0,0.1);
  --radius: 14px;
}

body {
  margin:0;
  font-family: sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 430px;
  margin: auto;
}

.header {
  padding:20px;
  font-weight:600;
}

.tabs {
  display:flex;
  gap:5px;
  padding:10px;
}

.tab {
  flex:1;
  padding:10px;
  border:1px solid var(--border);
  background:white;
  cursor:pointer;
}

.tab.active {
  background:black;
  color:white;
}

.page { display:none; padding:10px; }
.page.active { display:block; }

.card {
  background:var(--surface);
  padding:15px;
  border-radius:var(--radius);
  margin-bottom:10px;
}

input, textarea {
  width:100%;
  margin-top:8px;
  padding:10px;
}

button {
  margin-top:10px;
  padding:12px;
  width:100%;
  background:black;
  color:white;
  border:none;
}

.product {
  padding:10px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">Skin & Mind</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('today')">Today</button>
  <button class="tab" onclick="switchTab('products')">Products</button>
</div>

<!-- TODAY -->
<div id="page-today" class="page active">
  <div class="card">
    <p>Track your day here (your original stuff stays)</p>
  </div>
</div>

<!-- PRODUCTS -->
<div id="page-products" class="page">
  <div class="card">
    <h3>Your products</h3>
    <div id="product-list"></div>
  </div>

  <div class="card">
    <h3>Add product</h3>

    <input id="name" placeholder="Product name">

    <textarea id="ingredients" placeholder="Ingredients (comma separated)"></textarea>

    <textarea id="pros" placeholder="Pros auto-fill"></textarea>
    <textarea id="cons" placeholder="Cons auto-fill"></textarea>

    <button onclick="addProduct()">Add Product</button>
  </div>
</div>

<script>
// SMART INGREDIENT DATABASE
const DB = {
  "niacinamide": {pros:"Reduces oil, helps acne", cons:"Can irritate"},
  "salicylic acid": {pros:"Clears pores", cons:"Can dry skin"},
  "hyaluronic acid": {pros:"Hydrates skin", cons:"Needs moisture"},
  "vitamin c": {pros:"Brightens skin", cons:"Can irritate"}
};

// LOAD
let products = JSON.parse(localStorage.getItem("products") || "[]");

// SWITCH TABS
function switchTab(tab) {
  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.toggle("active", (tab==="today"&&i===0)||(tab==="products"&&i===1));
  });

  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+tab).classList.add("active");

  if(tab==="products") renderProducts();
}

// AUTO FILL
document.getElementById("ingredients").oninput = function() {
  const list = this.value.split(",").map(i=>i.trim().toLowerCase());

  let pros=[], cons=[];

  list.forEach(i=>{
    if(DB[i]){
      pros.push(DB[i].pros);
      cons.push(DB[i].cons);
    }
  });

  document.getElementById("pros").value = [...new Set(pros)].join(", ");
  document.getElementById("cons").value = [...new Set(cons)].join(", ");
};

// ADD PRODUCT
function addProduct(){
  const p = {
    id: Date.now(),
    name: document.getElementById("name").value,
    ingredients: document.getElementById("ingredients").value.split(","),
    pros: document.getElementById("pros").value,
    cons: document.getElementById("cons").value
  };

  products.unshift(p);
  localStorage.setItem("products", JSON.stringify(products));

  renderProducts();
}

// RENDER
function renderProducts(){
  const list = document.getElementById("product-list");
  list.innerHTML="";

  if(products.length===0){
    list.innerHTML="No products yet";
    return;
  }

  products.forEach(p=>{
    const d=document.createElement("div");
    d.className="product";
    d.innerText=p.name;

    d.onclick=()=>showProduct(p);

    list.appendChild(d);
  });
}

// VIEW PRODUCT
function showProduct(p){
  alert(
    p.name + "\n\n" +
    "Ingredients:\n" + p.ingredients.join(", ") + "\n\n" +
    "Pros:\n" + p.pros + "\n\n" +
    "Cons:\n" + p.cons
  );
}

// INIT
renderProducts();
</script>

</body>
</html>
